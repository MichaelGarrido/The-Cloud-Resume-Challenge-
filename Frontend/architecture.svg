<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" role="img" aria-labelledby="title desc">
  <title id="title">Cloud Resume Challenge Architecture</title>
  <desc id="desc">Diagram of GitHub Actions security checks deploying Terraform-managed AWS services with monitoring and PagerDuty alerts.</desc>
  <rect width="920" height="640" fill="#fbfcf8"/>
  <rect x="36" y="36" width="848" height="568" rx="18" fill="#ffffff" stroke="#d8e1df" stroke-width="2"/>
  <text x="70" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="800" fill="#162026">Cloud Resume Delivery Flow</text>
  <text x="70" y="118" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#60717a">Signed commits, security scans, staged delivery, AWS serverless runtime, and operations feedback.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="70" y="170" width="160" height="78" rx="8" fill="#164f46"/>
    <text x="103" y="202" fill="#ffffff">Developer</text>
    <text x="98" y="226" fill="#cfe3dd">GPG commits</text>

    <rect x="280" y="152" width="190" height="114" rx="8" fill="#f3f7f3" stroke="#d8e1df"/>
    <text x="324" y="185" fill="#162026">GitHub Actions</text>
    <text x="312" y="211" fill="#60717a">pytest • Cypress</text>
    <text x="310" y="235" fill="#60717a">Terraform deploys</text>

    <rect x="520" y="152" width="190" height="114" rx="8" fill="#f3f7f3" stroke="#d8e1df"/>
    <text x="563" y="184" fill="#162026">Security Gate</text>
    <text x="554" y="211" fill="#60717a">CodeQL • Syft</text>
    <text x="552" y="235" fill="#60717a">Grype • Signer</text>

    <rect x="118" y="340" width="180" height="104" rx="8" fill="#315f8c"/>
    <text x="158" y="375" fill="#ffffff">Frontend</text>
    <text x="150" y="400" fill="#dbeaf5">S3 + CloudFront</text>
    <text x="170" y="424" fill="#dbeaf5">Route 53</text>

    <rect x="370" y="340" width="180" height="104" rx="8" fill="#b8863b"/>
    <text x="418" y="375" fill="#ffffff">Backend</text>
    <text x="407" y="400" fill="#fff0d4">API Gateway</text>
    <text x="405" y="424" fill="#fff0d4">Lambda + DynamoDB</text>

    <rect x="622" y="340" width="180" height="104" rx="8" fill="#162026"/>
    <text x="661" y="375" fill="#ffffff">Operations</text>
    <text x="654" y="400" fill="#dce4e2">CloudWatch + SNS</text>
    <text x="675" y="424" fill="#dce4e2">PagerDuty</text>
  </g>

  <g fill="none" stroke="#6f807b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M230 209 H280"/>
    <path d="M470 209 H520"/>
    <path d="M615 266 V306 H208 V340"/>
    <path d="M615 266 V306 H460 V340"/>
    <path d="M615 266 V306 H712 V340"/>
    <path d="M298 392 H370"/>
    <path d="M550 392 H622"/>
  </g>

  <g fill="#6f807b">
    <path d="M278 209l-10-6v12z"/>
    <path d="M518 209l-10-6v12z"/>
    <path d="M208 338l-6-10h12z"/>
    <path d="M460 338l-6-10h12z"/>
    <path d="M712 338l-6-10h12z"/>
    <path d="M368 392l-10-6v12z"/>
    <path d="M620 392l-10-6v12z"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#60717a">
    <text x="300" y="520">Test environments are created for pull requests.</text>
    <text x="300" y="546">Production deploys require approval and signed Lambda artifacts.</text>
    <text x="300" y="572">Monitoring routes alerts to email and PagerDuty.</text>
  </g>
</svg>
