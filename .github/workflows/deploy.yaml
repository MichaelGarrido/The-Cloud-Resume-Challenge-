name: Deploy Resume Site

on:
  pull_request:
    branches:
      - main
    paths:
      - "Frontend/**"
      - "Backend/**"
      - "Infra/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.js"
      - "package.json"
      - "package-lock.json"
      - "pytest.ini"
      - ".github/workflows/deploy.yaml"

  push:
    branches:
      - main
    paths:
      - "Frontend/**"
      - "Backend/**"
      - "Infra/**"
      - "tests/**"
      - "cypress/**"
      - "cypress.config.js"
      - "package.json"
      - "package-lock.json"
      - "pytest.ini"
      - ".github/workflows/deploy.yaml"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build / Validate Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required frontend files
        run: |
          test -f Frontend/error.html
          test -f Frontend/index.html.tpl
          echo "Frontend looks good"

  test:
    name: Run Python Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest boto3

      - name: Run tests
        run: pytest -v

  deploy:
    name: Deploy Infra and Site
    runs-on: ubuntu-latest
    needs: test
    outputs:
      site_url: ${{ steps.tf.outputs.site_url }}
      distribution_id: ${{ steps.tf.outputs.distribution_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: Infra
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            terraform init -input=false -reconfigure -backend-config=backend-dev.hcl
          else
            terraform init -input=false -reconfigure -backend-config=backend-prod.hcl
          fi

      - name: Terraform Format Check
        working-directory: Infra
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: Infra
        run: terraform validate

      - name: Terraform Apply
        working-directory: Infra
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            terraform apply -auto-approve -var-file=dev.tfvars
          else
            terraform apply -auto-approve -var-file=prod.tfvars
          fi

      - name: Read Terraform outputs
        id: tf
        working-directory: Infra
        run: |
          echo "site_url=$(terraform output -raw site_url)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.tf.outputs.distribution_id }}" \
            --paths "/*"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Check homepage headers
        run: |
          curl -I "${{ needs.deploy.outputs.site_url }}"

      - name: Check homepage body
        run: |
          curl -s "${{ needs.deploy.outputs.site_url }}" | grep -i "<html"

  e2e-test:
    name: End-to-End Test
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress tests
        run: npx cypress run
